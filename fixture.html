<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fixture | Penca Agroventas</title>
  <link rel="stylesheet" href="styles.css?v=14" />
</head>

<body>

  <header class="app-header">
    <img src="assets/logo.png" alt="Agroventas" class="app-logo">

    <nav>
      <a href="fixture.html">Fixture</a>
      <a href="index.html">Inicio</a>
    </nav>
  </header>

  <main class="app-main">

    <section class="card fixture-card">

      <div class="fixture-top">

  <div>
    <h1>Fixture y pronósticos</h1>
    <p>Filtrá los partidos y cargá tus resultados.</p>  

    <div class="selector-cliente-box">
  <label for="codigoCliente">Número de telefono</label>

  <input
    type="text"
    id="codigoCliente"
    placeholder="Ingresá tu código"
  
  >

  <button id="buscarPorCodigo" class="btn-secundario">
    Entrar a mis pronósticos
  </button>

  <p id="clienteSeleccionadoTexto" class="cliente-seleccionado">
    Ingresá tu código para cargar tus pronósticos.
  </p>
</div>

  </div>

  <button id="guardarPronosticos" class="btn-secundario">
    Guardar pronósticos
  </button>

</div>

      <div class="filtros-fixture">

  <button class="filtro-btn activo" data-filtro="todos">
    Todos
  </button>

  <button class="filtro-btn" data-filtro="16avos de final">
    16avos
  </button>

 <button class="filtro-btn" data-filtro="Octavos de final">
  Octavos
</button>

  <button class="filtro-btn" data-filtro="Cuartos de final">
    Cuartos
  </button>

  <button class="filtro-btn" data-filtro="Semifinal">
    Semifinales
  </button>

  <button class="filtro-btn" data-filtro="Final">
    Final
  </button>

</div>

      <p id="contadorPartidos" class="contador-partidos"></p>

      <div id="listaFixture" class="fixture"></div>

    </section>

  </main>

<script type="module" src="app.js?v=50"></script>

</body>
</html>
