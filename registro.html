<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro | Agroventas</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body class="body-login">

  <div class="login-container">

    <img
      src="assets/logoNuevo.png"
      class="login-logo"
      alt="Agroventas"
    >

    <div class="login-box">

      <h1>Registro de cliente</h1>

      <form id="registro-form">

        <input
          type="text"
          id="nombre"
          placeholder="Nombre completo"
          required
        >

        <input
          type="text"
          id="empresa"
          placeholder="Empresa / Local"
          required
        >

        <input
          type="tel"
          id="celular"
          placeholder="Celular"
          required
        >

        <input
          type="email"
          id="email"
          placeholder="Correo electrónico"
          required
        >

        <input
          type="password"
          id="password"
          placeholder="Contraseña"
          required
        >

        <button type="submit">
          Registrarme
        </button>

      </form>

      <p class="login-link">
        ¿Ya tenés cuenta?
        <a href="login.html">Ingresar</a>
      </p>

    </div>

  </div>

  <script type="module" src="auth.js"></script>

</body>
</html>
